services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kevin_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file:
      - .env

  db:
    image: mysql:8.0
    container_name: kevin_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./dbdata:/var/lib/mysql
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: kevin_nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    depends_on:
      - app
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: kevin_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_ABSOLUTE_URI: https://kevin.devifyo.cloud/dbase/
    ports:
      - "8086:80"
    depends_on:
      - db